// ── GEOPUNTO (Leaflet dinámico con caché SW) ──────────────────
let _geoMap=null, _geoMarker=null;
function loadLeaflet(){
  if(window.L)return Promise.resolve();
  return new Promise((resolve,reject)=>{
    if(!document.getElementById('leaflet-css')){
      const css=document.createElement('link');
      css.id='leaflet-css';css.rel='stylesheet';
      css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(css);
    }
    if(!document.getElementById('leaflet-js')){
      const sc=document.createElement('script');
      sc.id='leaflet-js';
      sc.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      sc.onload=resolve;sc.onerror=reject;
      document.head.appendChild(sc);
    } else {
      if(window.L)resolve(); else document.getElementById('leaflet-js').onload=resolve;
    }
  });
}
function openGeopunto(){
  // Crear overlay modal
  const lat=parseFloat(STATE.draft2['10'])||7.8891;
  const lon=parseFloat(STATE.draft2['11'])||-72.9756;
  const hasCoords=STATE.draft2['10']&&STATE.draft2['11'];
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='geo-overlay';
  ov.innerHTML=`<div class="map-modal">
    <div class="map-modal-hdr"><span>📍 Capturar Geopunto</span><button class="btn-icon" onclick="closeGeopunto()">✕</button></div>
    <div id="geomap"></div>
    <div class="map-coords" id="geo-coords">
      Lat: <strong id="g-lat">${hasCoords?parseFloat(STATE.draft2['10']).toFixed(6):'—'}</strong> &nbsp;
      Lon: <strong id="g-lon">${hasCoords?parseFloat(STATE.draft2['11']).toFixed(6):'—'}</strong>
    </div>
    <div class="geo-status" id="geo-status">Mueve el marcador o usa el botón para capturar tu ubicación actual.</div>
    <div class="map-modal-footer">
      <button class="btn btn-secondary" style="flex:1" onclick="gpsCapture()">🛰 Mi ubicación GPS</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmGeopunto()">✓ Confirmar punto</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  loadLeaflet().then(()=>{
    _geoMap=L.map('geomap').setView([lat,lon],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap',maxZoom:19
    }).addTo(_geoMap);
    _geoMarker=L.marker([lat,lon],{draggable:true}).addTo(_geoMap);
    _geoMarker.bindPopup('Arrastra para ajustar').openPopup();
    _geoMarker.on('dragend',()=>{
      const p=_geoMarker.getLatLng();
      document.getElementById('g-lat').textContent=p.lat.toFixed(6);
      document.getElementById('g-lon').textContent=p.lng.toFixed(6);
    });
    _geoMap.on('click',e=>{
      _geoMarker.setLatLng(e.latlng);
      document.getElementById('g-lat').textContent=e.latlng.lat.toFixed(6);
      document.getElementById('g-lon').textContent=e.latlng.lng.toFixed(6);
    });
    setTimeout(()=>_geoMap.invalidateSize(),200);
  }).catch(()=>{
    document.getElementById('geomap').innerHTML=
      '<div style="padding:24px;text-align:center;color:var(--muted)">Sin conexión — el mapa no puede cargarse.<br>Usa el botón GPS o ingresa las coordenadas manualmente.</div>';
    document.getElementById('geo-status').textContent='Modo offline: solo captura GPS disponible.';
  });
}
function gpsCapture(){
  const st=document.getElementById('geo-status');
  if(st)st.textContent='Obteniendo ubicación GPS…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    if(st)st.textContent=`GPS obtenido (precisión ±${Math.round(pos.coords.accuracy)}m). Puedes mover el marcador para ajustar.`;
    document.getElementById('g-lat').textContent=lat.toFixed(6);
    document.getElementById('g-lon').textContent=lon.toFixed(6);
    if(_geoMap&&_geoMarker){
      _geoMarker.setLatLng([lat,lon]);
      _geoMap.setView([lat,lon],17);
    }
  },err=>{
    if(st)st.textContent='Error GPS: '+err.message+'. Mueve el marcador manualmente.';
  },{enableHighAccuracy:true,timeout:15000});
}
function confirmGeopunto(){
  const latEl=document.getElementById('g-lat');
  const lonEl=document.getElementById('g-lon');
  if(!latEl||latEl.textContent==='—')return toast('Primero captura o mueve el marcador','err');
  const lat=latEl.textContent, lon=lonEl.textContent;
  STATE.draft2['10']=lat; STATE.draft2['11']=lon;
  // Actualizar inputs en el formulario sin re-render completo
  const li=document.getElementById('geo-lat');
  const lo=document.getElementById('geo-lon');
  if(li)li.value=lat;
  if(lo)lo.value=lon;
  closeGeopunto();
  toast('Geopunto registrado ✓','ok');
}
function closeGeopunto(){
  if(_geoMap){_geoMap.remove();_geoMap=null;_geoMarker=null;}
  const ov=document.getElementById('geo-overlay');
  if(ov)ov.remove();
}

// PLAN DE CUIDADO INDIVIDUAL (PCI) — Resolución 3280/2018 Minsalud Colombia
// Motor de reglas integrado en CCFP · reemplaza campo 28 (Intervenciones pendientes)
// ══════════════════════════════════════════════════════════════════════════

function calcPCI(ea,em,sexo,cond){
  const plan={paciente:{ciclo_vital_asignado:null,ruta_especial:null,sexo:sexo},
    plan_cuidado:{medicina_general:[],enfermeria:[],odontologia:[],psicologia:[],
      nutricion:[],laboratorios_y_apoyo_diagnostico:[],educacion_e_insumos:[]},alertas:[]};
  const pg=plan.plan_cuidado;const F=sexo==='F';const etm=ea*12+em;
  const esGest=cond.includes('gestante'),esPre=cond.includes('preconcepcional');
  const esPuer=cond.includes('puerperio'),rCV=cond.includes('riesgo_cv');
  const rMal=cond.includes('riesgo_malnutricion'),vSex=cond.includes('vida_sexual_activa');
  const rITS=cond.includes('riesgo_its'),sIVE=cond.includes('solicita_ive');
  /* ══ 1. RUTA MATERNO PERINATAL (Prioridad Absoluta) ══ */
  if(esGest||esPre||esPuer){
    plan.paciente.ruta_especial='Ruta Materno Perinatal';
    const etq=[];if(esPre)etq.push('Preconcepcional');if(esGest)etq.push('Gestante');if(esPuer)etq.push('Puerperio');
    plan.paciente.ciclo_vital_asignado=etq.join(' / ');
    if(esPre){
      pg.medicina_general.push('Atención Preconcepcional — Consulta de Medicina General');
      pg.enfermeria.push('Atención Preconcepcional — Valoración de Enfermería');
      pg.laboratorios_y_apoyo_diagnostico.push('Laboratorios preconcepcionales: Hemograma, Glicemia, Sífilis (VDRL), VIH, Toxoplasma, Rubéola, Grupo y Rh');
      pg.educacion_e_insumos.push('Suplementación con Ácido Fólico desde la etapa preconcepcional');
    }
    if(esGest){
      pg.medicina_general.push('Control Prenatal — Medicina General (bajo riesgo)');
      pg.medicina_general.push('Referencia a Ginecología si se identifica alto riesgo obstétrico');
      pg.laboratorios_y_apoyo_diagnostico.push('Panel Trimestral: VIH, Sífilis (VDRL/RPR), Toxoplasma, Rubéola, Hemograma, Glicemia, Urinálisis, Urocultivo');
      pg.odontologia.push('Valoración Odontológica Gestacional (1 vez durante el embarazo)');
      pg.nutricion.push('Valoración Nutricional Gestacional (1 vez)');
      pg.psicologia.push('Valoración Psicológica Gestacional (1 vez)');
      pg.educacion_e_insumos.push('Inscripción a Curso de Preparación en Maternidad y Paternidad');
      pg.educacion_e_insumos.push('Suplementación con Micronutrientes: Hierro + Ácido Fólico + Calcio');
    }
    if(esPuer){
      pg.medicina_general.push('Control Posparto — Consulta antes de los 7 días del parto');
      pg.medicina_general.push('Control del Recién Nacido — Antes del primer mes de vida');
      pg.enfermeria.push('Consejería en Lactancia Materna y Cuidados del Recién Nacido');
    }
    if(sIVE){
      pg.medicina_general.push('Asesoría IVE — Información, orientación y referencia (Medicina General)');
      pg.psicologia.push('Apoyo Psicológico en proceso de IVE');
      plan.alertas.push('Solicitud de IVE: Garantizar atención oportuna, no discriminatoria y con perspectiva de derechos. Activar ruta institucional.');
    }
    return plan;
  }
  /* ══ 2. PRIMERA INFANCIA (0–5 años) ══ */
  if(ea>=0&&ea<=5){
    plan.paciente.ciclo_vital_asignado='Primera Infancia (0 a 5 años)';
    const sch=[{lbl:'1 mes',max:1},{lbl:'2-3 meses',max:3},{lbl:'4-5 meses',max:5},
      {lbl:'6-8 meses',max:8},{lbl:'9-11 meses',max:11},{lbl:'12-18 meses',max:18},
      {lbl:'18-24 meses',max:24},{lbl:'24-30 meses',max:30},{lbl:'30-36 meses',max:36},
      {lbl:'3 años',max:48},{lbl:'4 años',max:60},{lbl:'5 años',max:72}];
    const pend=sch.filter(s=>etm<s.max).map(s=>s.lbl);
    pg.medicina_general.push('Control de Crecimiento y Desarrollo — '+(pend.length?'Próximas citas: '+pend.join(', '):'Cronograma completado — continuar con ciclo Infancia'));
    if(etm>=6) pg.odontologia.push('Aplicación de Barniz de Flúor — cada 6 meses (desde los 6 meses)');
    if(etm>=12) pg.odontologia.push('Consulta Odontológica programada: 12M, 2A, 3A, 4A, 5A');
    if(ea>=3)   pg.odontologia.push('Profilaxis Dental — 2 veces al año (desde los 3 años)');
    if(ea>=3&&ea<=5) pg.psicologia.push('Tamizaje RQC (Riesgo Psicosocial del Desarrollo) — Anual: 3A, 4A, 5A');
    if(etm>=12) pg.enfermeria.push('Desparasitación — 2 veces al año (desde los 12 meses)');
    if(etm>=6)  pg.educacion_e_insumos.push('Suplementación con Hierro y Vitamina A — desde los 6 meses');
    if(etm<12)  pg.laboratorios_y_apoyo_diagnostico.push('Tamizaje de Hemoglobina — programar a los 12 meses');
    else if(etm<24) pg.laboratorios_y_apoyo_diagnostico.push('Tamizaje de Hemoglobina — indicado al primer año de vida');
    if(rMal){pg.nutricion.push('Derivación prioritaria a Nutrición por Riesgo de Malnutrición');
      plan.alertas.push('Riesgo de malnutrición en primera infancia: Valoración nutricional prioritaria. Revisar curvas de crecimiento y antecedentes alimentarios.');}
  /* ══ 3. INFANCIA (6–11 años) ══ */
  }else if(ea>=6&&ea<=11){
    plan.paciente.ciclo_vital_asignado='Infancia (6 a 11 años)';
    pg.medicina_general.push('Control de Crecimiento y Desarrollo — Anual');
    pg.odontologia.push('Consulta Odontológica — Anual');
    pg.odontologia.push('Profilaxis Dental — 2 veces al año');
    pg.odontologia.push('Aplicación de Barniz de Flúor — 2 veces al año');
    pg.psicologia.push('Tamizaje RQC (Riesgo Psicosocial del Desarrollo) — Anual');
    pg.enfermeria.push('Desparasitación — 2 veces al año');
    if(rMal){pg.nutricion.push('Derivación a Nutrición por Riesgo de Malnutrición');
      plan.alertas.push('Riesgo de malnutrición detectado: Evaluar estado nutricional y hábitos alimentarios.');}
  /* ══ 4. ADOLESCENCIA (12–17 años) ══ */
  }else if(ea>=12&&ea<=17){
    plan.paciente.ciclo_vital_asignado='Adolescencia (12 a 17 años)';
    pg.medicina_general.push('Consulta Integral de Adolescentes / Control CyD — Anual');
    pg.odontologia.push('Consulta Odontológica — Anual');
    pg.odontologia.push('Profilaxis Dental — 2 veces al año');
    pg.odontologia.push('Aplicación de Barniz de Flúor — 2 veces al año');
    pg.psicologia.push('Tamizaje SRQ (Cuestionario de Salud Mental) — Anual');
    pg.educacion_e_insumos.push('Suministro de Preservativos');
    if(F&&ea>=10&&ea<=13) pg.laboratorios_y_apoyo_diagnostico.push('Tamizaje de Hemoglobina — Mujeres entre 10 y 13 años');
    if(vSex){pg.laboratorios_y_apoyo_diagnostico.push('Pruebas Rápidas de ITS: VIH, Sífilis (Treponémica), Hepatitis B');
      pg.medicina_general.push('Asesoría en Planificación Familiar y Métodos Anticonceptivos');
      plan.alertas.push('Adolescente con vida sexual activa: Activar tamizaje de ITS y asesoría anticonceptiva. Enfoque en derechos sexuales y reproductivos.');}
  /* ══ 5. JUVENTUD (18–28 años) ══ */
  }else if(ea>=18&&ea<=28){
    plan.paciente.ciclo_vital_asignado='Juventud (18 a 28 años)';
    pg.medicina_general.push('Valoración Integral — Medicina General (1 vez cada 5 años; incluye evaluación de riesgo cardiovascular)');
    pg.psicologia.push('Tamizaje SRQ (Cuestionario de Salud Mental)');
    pg.odontologia.push('Consulta Odontológica — 1 vez cada 2 años');
    pg.odontologia.push('Profilaxis Dental — Anual');
    pg.educacion_e_insumos.push('Suministro de Preservativos');
    if(F&&ea>=25) pg.laboratorios_y_apoyo_diagnostico.push('Citología Cervicovaginal — Esquema 1-1-3 (anual dos veces; luego cada 3 años si resultado normal)');
    else if(F&&ea<25) plan.alertas.push('Rastreo de cáncer cervicouterino: Citología aplica a partir de los 25 años (edad actual: '+ea+' años). Programar para los 25 años.');
    if(rITS||vSex) pg.laboratorios_y_apoyo_diagnostico.push('Pruebas Rápidas de ITS: VIH, Sífilis (Treponémica), Hepatitis B, Hepatitis C');
    if(rCV){pg.laboratorios_y_apoyo_diagnostico.push('Perfil Lipídico y Glicemia en Ayunas (por riesgo cardiovascular detectado)');
      plan.alertas.push('Riesgo cardiovascular en adulto joven: Incluir perfil cardiometabólico en la valoración integral. Reforzar hábitos saludables.');}
  /* ══ 6. ADULTEZ (29–59 años) ══ */
  }else if(ea>=29&&ea<=59){
    plan.paciente.ciclo_vital_asignado='Adultez (29 a 59 años)';
    pg.medicina_general.push('Valoración Integral — Medicina General (cada 5 años; incluye evaluación de riesgo cardiovascular)');
    pg.psicologia.push('Tamizaje SRQ (Cuestionario de Salud Mental) — En cada valoración integral');
    pg.odontologia.push('Consulta Odontológica — Cada 2 años');
    pg.odontologia.push('Profilaxis Dental — Cada 2 años');
    if(F){
      if(ea===29) pg.laboratorios_y_apoyo_diagnostico.push('Citología Cervicovaginal — Esquema 1-1-3 (inicio de rastreo)');
      else if(ea>=30) pg.laboratorios_y_apoyo_diagnostico.push('Prueba de ADN-VPH — Cada 5 años (reemplaza la citología como prueba primaria desde los 30 años)');
      if(ea>=40) pg.medicina_general.push('Valoración Clínica de Mama — Anual (desde los 40 años)');
      if(ea>=50) pg.laboratorios_y_apoyo_diagnostico.push('Mamografía Bilateral — Cada 2 años (desde los 50 años)');
    }
    if(!F&&ea>=50) pg.laboratorios_y_apoyo_diagnostico.push('Tamizaje de Cáncer de Próstata: PSA + Tacto Rectal — Cada 5 años (desde los 50 años)');
    if(ea>=50) pg.laboratorios_y_apoyo_diagnostico.push('Sangre Oculta en Heces (SOH) — Cada 2 años (rastreo de cáncer colorrectal desde los 50 años)');
    if(rCV){pg.laboratorios_y_apoyo_diagnostico.push('Perfil Lipídico, Glicemia en Ayunas y HbA1c (por riesgo cardiovascular)');
      plan.alertas.push('Riesgo cardiovascular: Incluir perfil cardiometabólico completo. Considerar cálculo de riesgo CV a 10 años (Framingham/OPS). Derivar a Medicina Interna si es necesario.');}
    if(rMal){pg.nutricion.push('Valoración Nutricional por Riesgo de Malnutrición');
      plan.alertas.push('Riesgo de malnutrición en etapa adulta: Evaluar composición corporal, hábitos alimentarios y causas subyacentes.');}
  /* ══ 7. VEJEZ (≥ 60 años) ══ */
  }else if(ea>=60){
    plan.paciente.ciclo_vital_asignado='Vejez (60 años en adelante)';
    pg.medicina_general.push('Valoración Integral Geriátrica — Medicina General (cada 3 años; incluye valoración funcional, cognitiva y de riesgo cardiovascular)');
    pg.psicologia.push('Tamizaje SRQ (Cuestionario de Salud Mental) — En cada valoración integral');
    pg.odontologia.push('Consulta Odontológica — Cada 2 años');
    pg.odontologia.push('Profilaxis Dental — Cada 2 años');
    if(F){
      if(ea<=65) pg.laboratorios_y_apoyo_diagnostico.push('Prueba de ADN-VPH o Citología Cervicovaginal — Hasta los 65 años (si hay historial de resultados normales)');
      else plan.alertas.push('Rastreo de cáncer cervicouterino: Paciente > 65 años — NO aplica tamizaje rutinario si cuenta con 3 citologías negativas consecutivas. Revisar historial clínico.');
      pg.medicina_general.push('Valoración Clínica de Mama — Anual (sin límite de edad establecido)');
      if(ea<=69) pg.laboratorios_y_apoyo_diagnostico.push('Mamografía Bilateral — Cada 2 años (hasta los 69 años)');
      else plan.alertas.push('Mamografía: Paciente > 69 años — fuera del rango de tamizaje poblacional rutinario. Evaluar indicación individual con el equipo médico.');
    }
    if(!F){
      if(ea<=75) pg.laboratorios_y_apoyo_diagnostico.push('Tamizaje de Cáncer de Próstata: PSA + Tacto Rectal — Cada 5 años (hasta los 75 años)');
      else plan.alertas.push('Tamizaje de próstata: Paciente > 75 años — fuera del rango recomendado. El balance riesgo-beneficio no favorece el tamizaje rutinario a esta edad. Consultar con Urología si hay síntomas.');
    }
    if(ea<=75) pg.laboratorios_y_apoyo_diagnostico.push('Sangre Oculta en Heces (SOH) — Cada 2 años (rastreo de cáncer colorrectal hasta los 75 años)');
    else plan.alertas.push('Rastreo de cáncer colorrectal: Paciente > 75 años — fuera del rango recomendado. Evaluar con el equipo clínico si hay síntomas sugestivos.');
    if(rCV){pg.laboratorios_y_apoyo_diagnostico.push('Perfil Lipídico, Glicemia en Ayunas y HbA1c (por riesgo cardiovascular en adulto mayor)');
      plan.alertas.push('Riesgo cardiovascular en adulto mayor: Priorizar valoración integral. Evaluar polifarmacia, fragilidad y funcionalidad. Derivar a Medicina Interna o Geriatría si corresponde.');}
    if(rMal){pg.nutricion.push('Valoración Nutricional por Riesgo de Malnutrición en Adulto Mayor (aplicar tamizaje MNA — Mini Nutritional Assessment)');
      plan.alertas.push('Riesgo de malnutrición en adulto mayor: Evaluación prioritaria. Considerar impacto de sarcopenia, polifarmacia y condiciones crónicas.');}
  }
  return plan;
}

function mapPlanToPISIS(plan){
  const codes=new Set();
  const all=Object.values(plan.plan_cuidado).flat();
  const R=[
    [/Valoración Integral.*Medicina|Control de Crecimiento|Consulta Integral de Adolescentes|Valoración Integral Geriátrica/i,'1'],
    [/Odontológi|Consulta Odontológica|Valoración Odontológ/i,'2'],
    [/Lactancia Materna/i,'3'],
    [/Barniz de Flúor/i,'4'],
    [/Profilaxis Dental/i,'5'],
    [/Micronutrientes|Hierro.*Ácido|Vitamina A|Suplementación.*Hierro|Suplementación.*Ácido|Ácido Fólico/i,'8'],
    [/Desparasitación/i,'9'],
    [/Hemoglobina|Hematocrito/i,'10'],
    [/Planificación Familiar|Anticoncep|Preservativo/i,'11'],
    [/Lipídico|cardiometaból|Framingham|HbA1c.*riesgo|Glicemia.*riesgo cardiovascular/i,'12'],
    [/ITS|Sífilis|Hepatitis/i,'13'],
    [/Citología|ADN-VPH|Cuello Uterino|Cervicovaginal/i,'14'],
    [/Valoración Clínica de Mama|Mamografía/i,'15'],
    [/Próstata|PSA/i,'16'],
    [/Sangre Oculta|colorrectal/i,'17'],
    [/Preconcepcional/i,'18'],
    [/Control Prenatal|cuidado prenatal/i,'19'],
    [/Maternidad y Paternidad|Curso de Preparación/i,'20'],
    [/IVE|Interrupción Voluntaria/i,'21'],
    [/Puerperio|Posparto/i,'22'],
    [/Recién Nacido/i,'23'],
    [/Educación para la salud/i,'25'],
  ];
  all.forEach(item=>R.forEach(([re,c])=>{if(re.test(item))codes.add(c);}));
  return codes.size>0?[...codes]:['26'];
}

function renderPCIBlock(d){
  const esM=d['10']==='2';
  const autoGest=d['11']==='1';
  const cond=Array.isArray(d['_pci_cond'])?d['_pci_cond']:[];
  let ageYr=null;
  if(d['9']){const ms=Date.now()-new Date(d['9']).getTime();ageYr=ms/(365.25*24*3600*1000);}
  const showIVE=esM&&(ageYr===null||ageYr>=12);

  const chk=(val,label,locked=false)=>{
    const active=locked?autoGest:cond.includes(val);
    const cls='mc-item'+(active?' selected':'')+(locked?' pci-locked':'');
    const note=locked&&autoGest?` <span style="font-size:10px;color:var(--green)">(auto · campo 11)</span>`:'';
    return `<div class="${cls}" onclick="${locked?'':`togglePCICond('${val}')`}">
      <div class="mc-box">${active?'✓':''}</div>
      <div class="mc-label">${esc(label)}${note}</div>
    </div>`;
  };

  let h=`<div class="field">`;
  h+=`<div class="field-label"><span class="field-num">28</span>${esc(fieldLabel3('28'))}</div>`;
  h+=`<div class="field-note" style="color:var(--blue-light,#6b90c6);margin-bottom:10px">
    ⚕ Plan de Cuidado Individual — Res. 3280/2018 · Marque las condiciones del paciente y presione Generar
  </div>`;

  if(esM){
    h+=`<div class="pci-sep">Ruta Materno Perinatal</div>
    <div class="mc-grid" style="margin-bottom:4px">
      ${chk('preconcepcional','Atención preconcepcional')}
      ${chk('gestante','Gestante (embarazada)',true)}
      ${chk('puerperio','Puerperio / posparto reciente')}
      ${showIVE?chk('solicita_ive','Solicita IVE'):''}
    </div>`;
  }
  h+=`<div class="pci-sep" style="margin-top:${esM?'10':'0'}px">Factores de Riesgo</div>
  <div class="mc-grid" style="margin-bottom:10px">
    ${chk('riesgo_cv','Riesgo cardiovascular')}
    ${chk('riesgo_malnutricion','Riesgo de malnutrición')}
    ${chk('vida_sexual_activa','Vida sexual activa')}
    ${chk('riesgo_its','Riesgo de ITS')}
  </div>`;
  h+=`<button class="btn btn-primary" style="width:100%" onclick="generarPCI()">⚕ Generar Plan de Cuidado Individual</button>`;

  const currentSexo=d['10']==='1'?'M':(d['10']==='2'?'F':'M');
  const pci=d['_pci'];
  if(pci){
    try{
      const plan=typeof pci==='string'?JSON.parse(pci):pci;
      const planSexo=plan.paciente?.sexo;
      // Actividades exclusivas de mujeres para detectar planes obsoletos sin sexo guardado
      const femAct=['Valoración Clínica de Mama','Mamografía','Citología','ADN-VPH','Cervicovaginal','IVE','Gestante','Prenatal','Puerperio'];
      const allItems=Object.values(plan.plan_cuidado||{}).flat().join(' ');
      const hasFemAct=femAct.some(a=>allItems.includes(a));
      const mismatch=(planSexo&&planSexo!==currentSexo)||(!planSexo&&hasFemAct&&currentSexo==='M');
      if(mismatch){
        h+=`<div class="pci-alert" style="margin-top:10px"><span style="flex-shrink:0">⚠</span><span>El plan guardado contiene actividades que no corresponden al sexo actual del paciente (<b>${currentSexo==='F'?'Femenino':'Masculino'}</b>). Presione <b>Generar Plan</b> para actualizarlo.</span></div>`;
      }else{
        h+=renderPCIResult(plan);
      }
    }catch(e){}
  }
  h+=`</div>`;return h;
}

function togglePCICond(val){
  const c=Array.isArray(STATE.draft3['_pci_cond'])?[...STATE.draft3['_pci_cond']]:[];
  const i=c.indexOf(val);if(i>=0)c.splice(i,1);else c.push(val);
  STATE.draft3['_pci_cond']=c;render();
}

function generarPCI(){
  const d=STATE.draft3;const dob=d['9'];
  let ea=0,em=0;
  if(dob){
    const birth=new Date(dob);
    if(!isNaN(birth)){
      let tm=(new Date().getFullYear()-birth.getFullYear())*12+(new Date().getMonth()-birth.getMonth());
      if(new Date().getDate()<birth.getDate())tm--;
      tm=Math.max(0,tm);ea=Math.floor(tm/12);em=tm%12;
    }
  }
  const sexo=d['10']==='1'?'M':(d['10']==='2'?'F':'M');
  const base=Array.isArray(d['_pci_cond'])?d['_pci_cond']:[];
  const cond=d['11']==='1'&&!base.includes('gestante')?[...base,'gestante']:base;
  const plan=calcPCI(ea,em,sexo,cond);
  const codes=mapPlanToPISIS(plan);
  STATE.draft3['_pci']=plan;
  STATE.draft3['28']=codes;
  render();toast('Plan de Cuidado Individual generado ✓','ok');
  setTimeout(()=>{const el=document.getElementById('pci-result');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

  const w=window.open('','_blank','width=800,height=600');

    <style>body{font-family:'Segoe UI',sans-serif;padding:20px;color:#222}@media print{button{display:none}}</style>
    </head><body>${body}<br><button onclick="window.print()">🖨 Imprimir</button></body></html>`);
  w.document.close();
}

  else if(ageM!==null&&ageM>=61&&ageM<=228){
    // ── 5-19 AÑOS (OMS 2007) ──
    const imc=peso/Math.pow(talla/100,2);
    const zBMI=_WHO.bfaZ(imc,ageM,boy);
    code24='8';

      rows.push(_nutRow('IMC calculado',`${imc.toFixed(1)} kg/m²`,'var(--muted)',''));
    }
  }
  else if(ageYr!==null&&ageYr>=19){
    // ── ADULTO ≥19 años (OMS) ──
    const imc=peso/Math.pow(talla/100,2);
    let dx,col;

  }

    // Sin fecha de nacimiento — mostrar IMC genérico si hay datos

  // Actualizar campo 24 (PISIS P/T)
  d['24']=code24;

  if(sel24)sel24.value=code24;

// Almacén temporal de resultados para sfSelect3 (evita romper atributos HTML con JSON.stringify)
const _sfRes = {};
function sfSearch3(id, resultsId, query){
  const data=id==='13'?REF_CIUO:id==='16'?REF_EAPB:[];
  // Si el texto ya tiene el formato "CODIGO — NOMBRE", buscar solo por el código
  const rawQ=(query||'').trim();
  const q=rawQ.includes(' — ')?rawQ.split(' — ')[0].trim().toLowerCase():rawQ.toLowerCase();
  const results=q.length<1?data.slice(0,10)
    :data.filter(r=>r.v.toLowerCase().includes(q)||r.l.toLowerCase().includes(q)).slice(0,15);
  _sfRes[resultsId]=results; // guardar por clave para recuperar en sfSelect3
  const el=document.getElementById(resultsId);
  if(!el)return;
  if(!results.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=results.map((r,i)=>`<div class="sf-item" onmousedown="sfSelect3('${id}','${resultsId}',${i})"><span class="sf-code">${esc(r.v)}</span><span class="sf-label">${esc(r.l)}</span></div>`).join('');
}
function sfSelect3(id, resultsId, idx){
  const r=(_sfRes[resultsId]||[])[idx];
  if(!r)return;
  STATE.draft3[id]=r.v;
  const inputEl=document.getElementById(`sf3-in-${id}`);
  if(inputEl)inputEl.value=r.v+' — '+r.l;
  const el=document.getElementById(resultsId);
  if(el)el.style.display='none';
}

function nuevaFamilia(){
  STATE.editFamId=null; STATE.t2step=1;
  const ebsDefault = myEBS()[0]||'';
  // Auto-generate campo 18: next ficha number after existing max
  let maxFicha=0;
  for(const f of STATE.familias){const n=parseInt(f.d2?.['18']||'0')||0;if(n>maxFicha)maxFicha=n;}
  const _admin=isAdmin();
  STATE.draft2={
    '2':'1','3':'54','4':STATE.config.uzpe||'41SR002',
    '5':_admin?'':'',               // municipio: vacío siempre al inicio
    '6':_admin?'':'T99',            // territorio: vacío para admin, placeholder para campo
    '7':_admin?'':'MT99',           // microterritorio: ídem
    ebs_num:_admin?'':'001',        // admin sin EBS pre-asignado
    hogar_num:'',familia_num:'1',
    '15':'1','16':'1','17':'1','18':String(maxFicha+1),
    '20':STATE.config.nit||'','21':'CC','25':today()
  };
  // Apply configured defaultVals from fieldConfig.t2 (before EBS override so EBS wins)
  const fc2 = STATE.fieldConfig?.t2||{};
  Object.entries(fc2).forEach(([id,cfg])=>{
    if(cfg.defaultVal && !STATE.draft2[id]) STATE.draft2[id]=cfg.defaultVal;
  });
  // Pre-fill geo/EBS codes from user's assigned EBS code (these always override)
  if (ebsDefault.length>=27) {
    STATE.draft2['3']=ebsDefault.slice(0,2);
    STATE.draft2['4']=ebsDefault.slice(2,9);
    STATE.draft2['5']=ebsDefault.slice(9,14);
    STATE.draft2.ebs_num=ebsDefault.slice(24,27);
    STATE.draft2['16']=String(parseInt(ebsDefault.slice(24,27))||1);
    // Territorio y microterritorio desde TERRIT_MAP (prioridad sobre el código EBS almacenado)
    const _ti=terrInfoFor(STATE.draft2.ebs_num);
    if(_ti){STATE.draft2['6']=_ti.tc;STATE.draft2['7']='';}
    else{STATE.draft2['6']=ebsDefault.slice(14,17);STATE.draft2['7']=ebsDefault.slice(17,21);}
  }
  navigate('familia_t2');
}
function editFamilia(id){
  const fam=STATE.familias.find(f=>f.id===id);
  if(!fam)return;
  STATE.editFamId=id; STATE.t2step=1;
  STATE.draft2=JSON.parse(JSON.stringify(fam.d2||{}));
  navigate('familia_t2');
}
async function deleteFamilia(id){
  if(!confirm('¿Eliminar esta familia y todos sus integrantes?'))return;
  STATE.familias=STATE.familias.filter(f=>f.id!==id);
  await softDeleteRecord('familias',id);
  // Soft-delete personas
  const ps=await idb.getAllByIndex('personas','familia_id',id);
  for(const p of ps) await softDeleteRecord('personas',p.id);
  render(); toast('Familia eliminada','ok');
}

        <div class="step-label">${s}</div></div>`;}).join('')+'</div></div>';

  if(step===1)content=renderT2Step1(d);
  else if(step===2)content=renderT2Step2(d);
  else if(step===3)content=renderT2Step3(d);
  else if(step===4)content=renderT2Step4(d);
  else content=renderT2Step5(d);
  const prev=step>1?`<button class="btn btn-secondary" onclick="STATE.t2step=${step-1};render()">← Anterior</button>`
                   :`<button class="btn btn-secondary" onclick="navigate('home')">Cancelar</button>`;
  const next=step<5?`<button class="btn btn-primary" onclick="STATE.t2step=${step+1};render()">Siguiente →</button>`
                   :`<button class="btn btn-primary" onclick="saveFamilia()">💾 Guardar familia</button>`;
  return stepsHtml+content+`<div class="bottom-bar">${prev}${next}</div>`;
}

  const _uzpeLbl = v => v === '41SR002' ? '41-SR00254' : v;

  const _uzpeRef = STATE.config.uzpe || d['4'] || '41SR002';

    uzpeOpts.unshift({v: _uzpeRef, l: _uzpeLbl(_uzpeRef)});

  // ── Territorio y Microterritorio — lógica diferenciada admin vs campo ──
  const _terrInfo = terrInfoFor(d.ebs_num);

  if (isAdmin()) {

    const muniSel = d['5']||'';

      const seen=new Set(), terrOpts=[];
      Object.entries(EBS_MUNI_MAP).forEach(([num,m])=>{

let _savingFam = false;
async function saveFamilia(){
  if(_savingFam) return;
  _savingFam = true;
  const d=STATE.draft2;
  if(!d['2']||!d['3']||!d['5']||!d['8']){_savingFam=false;return toast('Complete los campos obligatorios del Paso 1','err');}
  if(!d['25']){_savingFam=false;return toast('Complete la fecha de diligenciamiento (Paso 2)','err');}
  if(!d['26']){_savingFam=false;return toast('Seleccione el tipo de vivienda (Paso 3)','err');}
  if(!d['54']){_savingFam=false;return toast('Seleccione el tipo de familia (Paso 5)','err');}
  // Ensure auto-derived fields are set correctly before saving
  d['15'] = '1'; // Siempre IPS Pública para HRNO
  d['16'] = String(parseInt(d.ebs_num||d['16']||'1')||1);
  const ebsCode=calcEBS(d);
  if(STATE.editFamId){
    const fam=STATE.familias.find(f=>f.id===STATE.editFamId);
    if(fam){
      fam.d2={...d}; fam.ebs_code=ebsCode; fam.updated_at=new Date().toISOString();
      await writeRecord('familias',{id:fam.id,ebs_code:ebsCode,d2:d,updated_at:fam.updated_at,created_by:fam.created_by,created_at:fam.created_at});
    }
  } else {
    const id=uid();
    const now=new Date().toISOString();
    const rec={id,ebs_code:ebsCode,d2:{...d},created_by:STATE.auth?.user?.id,created_at:now,updated_at:now};
    STATE.familias.push({...rec,personas:[]});
    await writeRecord('familias',rec);
  }
  _savingFam = false;
  toast('Familia guardada','ok'); navigate('home');
}

  STATE.draft3={'7':'CC','10':'','15':'1','18':'07','21':['8']};

function editPersona(famId,perId){
  const fam=STATE.familias.find(f=>f.id===famId);

  STATE.editFamId=famId; STATE.editPerId=perId;

function calcEdadAnios(fechaNac){
  if(!fechaNac)return null;
  const nac=new Date(fechaNac);
  if(isNaN(nac))return null;
  const h=new Date();
  let e=h.getFullYear()-nac.getFullYear();
  if(h.getMonth()<nac.getMonth()||(h.getMonth()===nac.getMonth()&&h.getDate()<nac.getDate()))e--;
  return e;
}

function _tamChip(icon,label,score,color,sub){
  return `<div class="tool-result-chip">
    <div class="tool-score-big" style="color:${color};font-size:${typeof score==='number'&&score<100?'28px':'20px'}">${typeof score==='number'?score:icon}</div>
    <div class="tool-result-text">
      <div class="tool-result-label" style="color:${color}">${esc(label)}</div>
      <div class="tool-result-sub">${esc(sub)}</div>
    </div>
  </div>`;
}

  '¿Tiene frecuentes dolores de cabeza?',

  '¿Le ha parecido alguna vez que usted bebía demasiado?',
  '¿Alguna vez le ha parecido a su familia, amigos o médico que fumaba demasiado cigarrillo?',
  '¿Alguna vez ha querido dejar de fumar, pero no ha podido?',
  '¿Ha experimentado con el consumo de sustancias (marihuana, cocaína, perico, hongos, LSD, etc.)?'
];
const SRQ_GRUPOS=[
  {id:'neuropsi',label:'Síntomas neuropsiquiátricos',qs:[0,19],cutoff:11,mode:'sum'},
  {id:'psi',label:'Síntomas psicóticos',qs:[20,24],cutoff:1,mode:'any'},
  {id:'alcohol',label:'Consumo de alcohol',qs:[25,29],cutoff:3,mode:'sum'},
  {id:'sustancias',label:'Tabaco y sustancias',qs:[30,32],cutoff:1,mode:'any'}
];

function _srqInterp(tam){
  const resp=tam.resp||[];
  const grupos=SRQ_GRUPOS.map(g=>{
    const slice=resp.slice(g.qs[0],g.qs[1]+1);
    const pos=slice.filter(x=>x==='1').length;
    const alert=g.mode==='sum'?(pos>=g.cutoff):pos>0;
    const alertPsico=g.id==='neuropsi'&&resp[16]==='1';
    return {...g,pos,alert:alert||alertPsico};
  });
  const anyAlert=grupos.some(g=>g.alert);
  const label=anyAlert?'Alto riesgo — Canalizar a EPS':'Sin riesgo detectado';
  const color=anyAlert?'var(--red)':'var(--green)';
  const detail=grupos.filter(g=>g.alert).map(g=>g.label).join(', ')||'';
  return {label,color,detail,grupos};
}

function openModalSRQ(){

function _renderSRQModal(){
  const ans=STATE._srqAns;
  const done=ans.filter(x=>x!==null).length;
  const grupos=SRQ_GRUPOS.map(g=>`

        </div>
      </div>`;}).join('')}
    </div>`).join('');
  const r=done>0?_srqInterp({resp:ans}):null;
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:500px">
      <div class="modal-title">🧠 SRQ — Autoreporte de Síntomas Psiquiátricos</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px">33 preguntas · Responda SI o NO · ${done}/33 respondidas</p>
      <div class="prog-bar"><div class="prog-fill" id="srq-bar" style="width:${(done/33*100).toFixed(0)}%"></div></div>
      ${grupos}
      ${r?`<div class="score-panel" style="border-color:${r.color}">
        <div style="font-size:11px;color:var(--muted)">RESULTADO</div>
        <div class="slbl" style="color:${r.color};font-size:16px">${esc(r.label)}</div>
        ${r.detail?`<div class="ssub">Alertas: ${esc(r.detail)}</div>`:''}
      </div>`:''}
      <div style="display:flex;gap:8px;position:sticky;bottom:0;background:var(--card);padding-top:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" style="flex:1" onclick="guardarSRQ()">Guardar SRQ</button>
      </div>
    </div>
  </div>`;}
function srqPick(qi,v){
  STATE._srqAns[qi]=v;
  const done=STATE._srqAns.filter(x=>x!==null).length;
  const bar=document.getElementById('srq-bar');
  if(bar)bar.style.width=(done/33*100).toFixed(0)+'%';
  // Update button styles
  const btns=document.querySelectorAll(`[onclick="srqPick(${qi},'1')"], [onclick="srqPick(${qi},'0')"]`);
  btns.forEach(b=>{ b.classList.remove('sel-ok','sel-err');
    if(b.getAttribute('onclick').includes("'1'")&&v==='1') b.classList.add('sel-ok');
    if(b.getAttribute('onclick').includes("'0'")&&v==='0') b.classList.add('sel-err');
  });
  // Refresh result panel
  const r=_srqInterp({resp:STATE._srqAns});
  const panel=document.querySelector('#modal-root .score-panel');
  if(panel){
    panel.style.borderColor=r.color;
    const lbl=panel.querySelector('.slbl');
    if(lbl){lbl.style.color=r.color;lbl.textContent=r.label;}
  }
}
function guardarSRQ(){
  const ans=STATE._srqAns;
  const done=ans.filter(x=>x!==null).length;
  if(done<33)return toast(`Complete todas las preguntas (${done}/33 respondidas)`,'err');
  const r=_srqInterp({resp:ans});
  STATE.draft3['tam_srq']={fecha:today(),resp:[...ans],grupos:r.grupos,riesgo:r.grupos.some(g=>g.alert)?'alto':'bajo'};
  delete STATE._srqAns;
  closeModal();
  toast('SRQ guardado · '+r.label,'ok');
  render();
}

function _auditInterp(score){
  if(score<=7) return {label:'Sin riesgo / Consumo de bajo riesgo',color:'var(--green)',accion:'No requiere intervención',cat:'bajo'};
  if(score<=15) return {label:'Consumo de riesgo',color:'var(--yellow)',accion:'Consejería breve',cat:'riesgo'};
  if(score<=19) return {label:'Consumo perjudicial',color:'var(--orange,#ff8c00)',accion:'Intervención breve + evaluación',cat:'perjudicial'};
  return {label:'Dependencia probable',color:'var(--red)',accion:'Canalizar a EPS urgente',cat:'dependencia'};
}

function _renderAUDITModal(){

        <div style="font-size:11px;color:var(--muted)">PUNTAJE TOTAL</div>
        <div class="snum" style="color:${r.color}">${score}</div>

        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>

  </div>`;}
function auditPick(qi,v){
  STATE._auditAns[qi]=v;
  const done=STATE._auditAns.filter(x=>x!==null).length;
  const score=STATE._auditAns.reduce((s,x)=>x!=null?s+x:s,0);
  const bar=document.getElementById('aud-bar');
  if(bar)bar.style.width=(done/10*100).toFixed(0)+'%';
  document.querySelectorAll('.ins-q').forEach((row,i)=>{
    row.querySelectorAll('.scale-btn').forEach(b=>{
      b.classList.toggle('sel-ok',b.getAttribute('onclick')===`auditPick(${i},${STATE._auditAns[i]})`);
    });
  });
  const r=_auditInterp(score);
  const panel=document.querySelector('#modal-root .score-panel');
  if(panel){
    panel.style.borderColor=r.color;
    const num=panel.querySelector('.snum');const lbl=panel.querySelector('.slbl');const sub=panel.querySelector('.ssub');
    if(num){num.style.color=r.color;num.textContent=score;}
    if(lbl){lbl.style.color=r.color;lbl.textContent=r.label;}
    if(sub)sub.textContent=r.accion;
  } else {
    const mp=document.querySelector('#modal-root .modal');
    if(mp&&!mp.querySelector('.score-panel')){
      const div=document.createElement('div');
      div.className='score-panel';div.style.borderColor=r.color;
      div.innerHTML=`<div style="font-size:11px;color:var(--muted)">PUNTAJE TOTAL</div><div class="snum" style="color:${r.color}">${score}</div><div class="slbl" style="color:${r.color}">${esc(r.label)}</div><div class="ssub">${esc(r.accion)}</div>`;
      mp.querySelector('.prog-bar').after(div);
    }
  }
}
function guardarAUDIT(){
  const ans=STATE._auditAns;
  const done=ans.filter(x=>x!==null).length;
  if(done<10)return toast(`Complete todas las preguntas (${done}/10)`,'err');
  const score=ans.reduce((s,x)=>s+x,0);
  const r=_auditInterp(score);
  STATE.draft3['tam_audit']={fecha:today(),resp:[...ans],score,nivel:r.cat};
  delete STATE._auditAns;
  closeModal();
  toast('AUDIT guardado · Score '+score+' · '+r.label,'ok');
  render();
}

const ASSIST_SUST=[
  {k:'tabaco',l:'Tabaco'},
  {k:'alcohol',l:'Alcohol'},
  {k:'cannabis',l:'Cannabis'},
  {k:'cocaina',l:'Cocaína'},
  {k:'anfetaminas',l:'Anfetaminas/estimulantes'},
  {k:'inhalantes',l:'Inhalantes'},
  {k:'tranquilizantes',l:'Tranquilizantes/somníferos'},
  {k:'alucinogenos',l:'Alucinógenos'},
  {k:'opiaceos',l:'Opiáceos'},
  {k:'otros',l:'Otras sustancias'}
];
const ASSIST_Q2_7_OPTS=[{v:0,l:'Nunca'},{v:2,l:'1-2 veces'},{v:3,l:'Cada mes'},{v:4,l:'Cada semana'},{v:6,l:'A diario'}];
const ASSIST_Q6_7_OPTS=[{v:0,l:'No, nunca'},{v:6,l:'Sí, últimos 3 meses'},{v:3,l:'Sí, antes'}];
const ASSIST_Q8_OPTS=[{v:0,l:'No, nunca'},{v:2,l:'Sí, últimos 3 meses'},{v:1,l:'Sí, pero antes'}];

function _assistInterp(score,sustKey){
  const sust=ASSIST_SUST.find(s=>s.k===sustKey)?.l||sustKey;
  if(score===0) return {label:'Sin consumo',color:'var(--green)',detail:'Sin riesgo detectado'};
  if(score<=10) return {label:`Riesgo bajo: ${sust}`,color:'var(--green)',detail:'Consejería breve sobre riesgos'};
  if(score<=26) return {label:`Riesgo moderado: ${sust}`,color:'var(--yellow)',detail:'Intervención breve recomendada'};
  return {label:`Riesgo alto: ${sust}`,color:'var(--red)',detail:'Canalizar a EPS / Tratamiento intensivo'};
}

function _assistScores(data){
  const scores={};
  ASSIST_SUST.forEach(s=>{
    const usedQ1=(data.q1||{})[s.k]===3;
    if(!usedQ1){scores[s.k]=0;return;}
    let t=0;
    [2,3,4,5,6,7].forEach(qi=>{const val=(data['q'+qi]||{})[s.k];if(val!=null)t+=val;});
    scores[s.k]=t;
  });
  return scores;
}

  STATE._assist={

      </div>`:''}

      <div style="display:flex;gap:8px;position:sticky;bottom:0;background:var(--card);padding-top:10px">

function assistQ1(sKey,v){
  STATE._assist.q1[sKey]=v;
  if(v===0)[2,3,4,5,6,7].forEach(qi=>{if(STATE._assist['q'+qi])delete STATE._assist['q'+qi][sKey];});
  // Q1 cambia la estructura (aparecen/desaparecen preguntas): re-render pero conserva scroll
  const overlay=document.querySelector('#modal-root .modal-overlay');
  const scrollTop=overlay?overlay.scrollTop:0;
  _renderASSISTModal();
  const newOverlay=document.querySelector('#modal-root .modal-overlay');
  if(newOverlay) newOverlay.scrollTop=scrollTop;
}
function assistQ(qKey,sKey,v){
  if(!STATE._assist[qKey])STATE._assist[qKey]={};
  STATE._assist[qKey][sKey]=v;
  // Solo actualiza botones del grupo y panel de puntaje — sin re-render
  document.querySelectorAll(`[data-q="${qKey}"][data-sust="${sKey}"]`).forEach(btn=>{
    btn.classList.toggle('sel-ok', Number(btn.dataset.v)===v);
  });
  _assistUpdateScorePanel();
}
function assistQ8(v){
  STATE._assist.q8=v;
  document.querySelectorAll('[data-q="q8"]').forEach(btn=>{
    btn.classList.toggle('sel-ok', Number(btn.dataset.v)===v);
  });
}
function _assistUpdateScorePanel(){
  const scores=_assistScores(STATE._assist);
  const maxScore=Math.max(0,...Object.values(scores));
  const riskHtml=ASSIST_SUST.filter(s=>scores[s.k]>0).map(s=>{
    const r=_assistInterp(scores[s.k],s.k);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0">
      <span style="font-size:12px">${esc(s.l)}</span>
      <span style="font-size:12px;font-weight:700;color:${r.color}">${scores[s.k]} — ${esc(r.label.split(':')[0])}</span>
    </div>`;}).join('');
  let panel=document.querySelector('#modal-root .score-panel');
  if(!panel&&maxScore>0){
    const footer=document.querySelector('#modal-root [style*="sticky"]');
    if(footer){

function rqcPick(qi,v){
  STATE._rqcAns[qi]=v;
  const done=STATE._rqcAns.filter(x=>x!==null).length;
  const score=STATE._rqcAns.filter(x=>x==='1').length;
  const bar=document.getElementById('rqc-bar');
  if(bar)bar.style.width=(done/10*100).toFixed(0)+'%';
  document.querySelectorAll('.ins-q').forEach((row,i)=>{
    row.querySelectorAll('.scale-btn').forEach(b=>{
      const onc=b.getAttribute('onclick');
      b.classList.remove('sel-ok','sel-err');
      if(onc===`rqcPick(${i},'1')`&&STATE._rqcAns[i]==='1') b.classList.add('sel-ok');
      if(onc===`rqcPick(${i},'0')`&&STATE._rqcAns[i]==='0') b.classList.add('sel-err');
    });
  });
  const r=_rqcInterp(score);
  const panel=document.querySelector('#modal-root .score-panel');
  if(panel){
    panel.style.borderColor=r.color;
    const num=panel.querySelector('.snum');const lbl=panel.querySelector('.slbl');const sub=panel.querySelector('.ssub');
    if(num){num.style.color=r.color;num.textContent=score;}
    if(lbl){lbl.style.color=r.color;lbl.textContent=r.label;}
    if(sub)sub.textContent=r.accion;
  }
}
function guardarRQC(){
  const ans=STATE._rqcAns;
  const done=ans.filter(x=>x!==null).length;
  if(done<10)return toast(`Complete todas las preguntas (${done}/10)`,'err');
  const score=ans.filter(x=>x==='1').length;
  const r=_rqcInterp(score);
  STATE.draft3['tam_rqc']={fecha:today(),resp:[...ans],score,riesgo:score>=3?'alto':'bajo'};
  delete STATE._rqcAns;
  closeModal();
  toast('RQC guardado · '+score+' positivos · '+r.label,'ok');
  render();
}

async function savePersona(){
  const d=STATE.draft3;
  if(!d['3']||!d['5']||!d['7']||!d['8']||!d['9']||!d['10'])
    return toast('Complete nombre, identificación, fecha de nacimiento y sexo','err');
  const fam=STATE.familias.find(f=>f.id===STATE.editFamId);
  if(!fam)return toast('Error: familia no encontrada','err');
  const ebsCode=fam.ebs_code||calcEBS(fam.d2||{});
  const now=new Date().toISOString();
  if(STATE.editPerId){
    const per=fam.personas.find(p=>p.id===STATE.editPerId);
    if(per){
      per.d3={...d};
      await writeRecord('personas',{id:per.id,familia_id:fam.id,ebs_code:ebsCode,d3:{...d},updated_at:now,created_by:per.created_by,created_at:per.created_at});
    }
  } else {
    if(!fam.personas)fam.personas=[];
    const id=uid();
    fam.personas.push({id,d3:{...d}});
    await writeRecord('personas',{id,familia_id:fam.id,ebs_code:ebsCode,d3:{...d},created_by:STATE.auth?.user?.id,created_at:now,updated_at:now});
  }
  fam.d2['55']=String(fam.personas.length);
  toast('Persona guardada','ok');
  navigate('familia_t3',{editFamId:STATE.editFamId});
}

function arrVal(v){if(!v||!Array.isArray(v))return v||'';return v.join(',');}

function resolveCustomVal(val, refKey) {
  // If a selected value is a custom code, find the "Otro" code and return label for description
  if (!val) return {val, desc:''};
  const arr = Array.isArray(val) ? val : [val];
  const resolved = [], descs = [];
  for (const v of arr) {
    const opt = (REF[refKey]||[]).find(o=>o.v===v);
    if (opt?.custom) {
      const otroCode = (REF[refKey]||[]).find(o=>o.l==='Otro'||o.l.startsWith('Otro'));
      resolved.push(otroCode?.v||v);
      descs.push(opt.l);
    } else { resolved.push(v); }
  }
  return {val: Array.isArray(val)?resolved:resolved[0], desc:descs.join('; ')};
}

function buildFile(){
  const c=STATE.config, fams=STATE.familias.filter(f=>!f.deleted_at);
  const totalT3=fams.reduce((s,f)=>(f.personas||[]).length+s,0);
  let consec=0;
  const lines=[];
  // Tipo 1
  const nitPad=String(c.nit||'').padStart(12,'0');
  lines.push([c.tipoEntidad,nitPad,c.fechaInicio,c.fechaFin,String(totalT3)].join('|'));
  fams.forEach((fam,fi)=>{
    consec++;
    const d=fam.d2||{};
    const idx=fi;
    const numViv=calcNumVivienda(d,idx);
    const numFam=calcNumFamilia(d,idx);
    const codFicha=calcCodFicha(d,idx);
    const numIdFam=calcNumIdFamilia(d,idx);
    const ebsCode=calcEBS(d);

    // Resolver opciones personalizadas
    const rv=(field,refKey)=>{const r=resolveCustomVal(d[field],refKey);return {v:r.val,desc:r.desc};};

    const t2=[
      '2',String(consec),d['2']||'',d['3']||'',d['4']||'',d['5']||'',d['6']||'',d['7']||'',
      d['8']||'',d['9']||'',d['10']||'',d['11']||'',d['12']||'',
      numViv,numFam,d['15']||'',d['16']||'',d['17']||'',d['18']||'',
      ebsCode,d['20']||'',d['21']||'',d['22']||'',d['23']||'',codFicha,d['25']||'',
      (()=>{const r=rv('26','tipoVivienda');return r.v})(),
      (()=>{const r=rv('26','tipoVivienda');return r.desc||d['27']||''})(),
      (()=>{const r=rv('28','materialPared');return r.v})(),
      (()=>{const r=rv('28','materialPared');return r.desc||d['29']||''})(),
      (()=>{const r=rv('30','materialPiso');return r.v})(),
      (()=>{const r=rv('30','materialPiso');return r.desc||d['31']||''})(),
      (()=>{const r=rv('32','materialTecho');return r.v})(),
      (()=>{const r=rv('32','materialTecho');return r.desc||d['33']||''})(),
      d['34']||'',d['35']||'',
      arrVal(d['36']),arrVal(d['37']),arrVal(d['38']),
      d['39']||'',arrVal(d['40']),d['41']||'',d['42']||'',
      arrVal(d['43']),d['44']||'',d['45']||'',
      arrVal(d['46']),d['47']||'',arrVal(d['48']),d['49']||'',
      arrVal(d['50']),d['51']||'',arrVal(d['52']),d['53']||'',
      d['54']||'',d['55']||'',arrVal(d['56']),d['57']||'',
      d['58']||'',d['59']||'',d['60']||'',
      d['61']||'',d['62']||'',d['63']||'',d['64']||'',
      d['65']||'',d['66']||'',arrVal(d['67']),d['68']||'',
      d['69']||'',d['70']||'',d['71']||'',d['72']||'',
      arrVal(d['73']),d['74']||'',d['75']||'',d['76']||'',
      d['77']||'',d['78']||'',d['79']||'',d['80']||'',
      d['81']||'',d['82']||'',d['83']||'',numIdFam
    ];
    lines.push(t2.join('|'));
    (fam.personas||[]).forEach(per=>{
      consec++;
      const pd=per.d3||{};
      const numIdInt=numIdFam+(pd['7']||'')+(pd['8']||'');
      const t3=['3',String(consec),'',
        pd['3']||'',pd['4']||'',pd['5']||'',pd['6']||'',
        pd['7']||'',pd['8']||'',pd['9']||'',pd['10']||'',pd['11']||'',
        pd['12']||'',pd['13']||'',pd['14']||'',pd['15']||'',pd['16']||'',
        arrVal(pd['17']),pd['18']||'',arrVal(pd['19']),pd['20']||'',
        arrVal(pd['21']),pd['22']||'',pd['23']||'',pd['24']||'',pd['25']||'',
        pd['26']||'',pd['27']||'',arrVal(pd['28']),arrVal(pd['29']),
        pd['30']||'',pd['31']||'',pd['32']||'',arrVal(pd['33']),
        pd['34']||'',pd['35']||'',pd['36']||'',arrVal(pd['37']),
        numIdFam,numIdInt
      ];
      lines.push(t3.join('|'));
    });
  });
  return lines;
}

function downloadFile(){
  try{
    const lines=buildFile();
    const content=lines.join('\n');
    const c=STATE.config;
    const fechaC=(c.fechaFin||'').replace(/-/g,'');
    const nitPad=String(c.nit||'').padStart(12,'0');
    const fileName=`APS124CCFP${fechaC}${c.tipoEntidad}${nitPad}.TXT`;
    const blob=new Blob([content],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast('Archivo descargado: '+fileName,'ok');
  }catch(e){toast('Error: '+e.message,'err');}
}

// ── Cómputo de indicadores ────────────────────────────────────
function computeAn() {
  const myId = STATE.auth?.user?.id;
  const fams = STATE.familias.filter(f=>!f.deleted_at && (isAdmin()||f.created_by===myId));

  // KPIs
  let totalFam=fams.length, totalPer=0, totalGest=0;
  const avgPer = () => totalFam ? (totalPer/totalFam).toFixed(1) : '—';

  // T2 (familia)
  const byEBS={}, byMuni={}, byTime={}, byZona={}, byVivienda={}, byPared={}, byAgua={}, byTipoFam={};
  // T3 (persona)
  const bySexo={}, byGrupo={}, byAfil={}, byNutr={}, byVac={'si':0,'no':0,'nd':0}, byDisc={}, byInterv={};

  const multiCount=(obj,val)=>{
    const arr=Array.isArray(val)?val:(val?[val]:[]);
    arr.forEach(v=>{ if(v) obj[v]=(obj[v]||0)+1; });
  };

  fams.forEach(f=>{
    const d=f.d2||{};
    // EBS
    const en=(d['16']||'').padStart(3,'0')||f.ebs_code?.slice(-3)||'???';
    byEBS[en]=(byEBS[en]||0)+1;
    // Municipio
    const mu=d['5']||''; if(mu) byMuni[MUNIS_NS[mu]||mu]=(byMuni[MUNIS_NS[mu]||mu]||0)+1;
    // Tiempo
    const fe=d['25']||''; if(fe.length>=7) byTime[fe.slice(0,7)]=(byTime[fe.slice(0,7)]||0)+1;
    // Zona
    const zo={1:'Urbana',2:'Rural dispersa',3:'Rural'}[d['18']]||(d['18']||'S/D');
    byZona[zo]=(byZona[zo]||0)+1;
    // Vivienda
    const vi=(REF.tipoVivienda.find(o=>o.v===d['26'])?.l)||d['26']||'S/D';
    byVivienda[vi]=(byVivienda[vi]||0)+1;
    // Material pared
    const pa=(REF.materialPared.find(o=>o.v===d['28'])?.l)||d['28']||'S/D';
    if(d['28']) byPared[pa]=(byPared[pa]||0)+1;
    // Agua
    const aguaArr=Array.isArray(d['37'])?d['37']:(d['37']?[d['37']]:[]);
    aguaArr.forEach(a=>{ const l=(REF.fuenteAgua.find(o=>o.v===a)?.l)||a; if(a)byAgua[l]=(byAgua[l]||0)+1; });
    // Tipo familia
    const tf=(REF.tipoFamilia.find(o=>o.v===d['54'])?.l)||d['54']||'S/D';
    if(d['54']) byTipoFam[tf]=(byTipoFam[tf]||0)+1;
    // Gestante en familia
    if(d['62']==='1') totalGest++;

    // Personas
    (f.personas||[]).forEach(p=>{
      totalPer++;
      const pd=p.d3||{};
      // Sexo
      const sx=(REF.sexo.find(o=>o.v===pd['10'])?.l)||(pd['10']||'S/D');
      bySexo[sx]=(bySexo[sx]||0)+1;
      // Grupo poblacional (multi)
      multiCount(byGrupo, pd['17']);
      // Régimen
      const af=(REF.regimen.find(o=>o.v===pd['15'])?.l)||(pd['15']||'S/D');
      if(pd['15']) byAfil[af]=(byAfil[af]||0)+1;
      // Diagnóstico nutricional
      const nu=(REF.pesoTalla.find(o=>o.v===pd['24'])?.l)||(pd['24']||'');
      if(pd['24']) byNutr[nu]=(byNutr[nu]||0)+1;
      // Vacunas al día
      if(pd['30']==='1') byVac.si++; else if(pd['30']==='2') byVac.no++; else byVac.nd++;
      // Discapacidad (multi)
      multiCount(byDisc, pd['21']);
      // Intervenciones pendientes (multi)
      multiCount(byInterv, pd['28']);
    });
  });

  // Resolver byGrupo labels
  const byGrupoL={};
  Object.entries(byGrupo).forEach(([v,n])=>{
    const l=(REF.grupoPoblacional.find(o=>o.v===v)?.l)||v;
    byGrupoL[l]=(byGrupoL[l]||0)+n;
  });
  // Resolver byInterv labels
  const byIntervL={};
  Object.entries(byInterv).forEach(([v,n])=>{
    const l=(REF.intervencionPendiente.find(o=>o.v===v)?.l)||v;
    byIntervL[l]=(byIntervL[l]||0)+n;
  });
  // Resolver byDisc labels
  const byDiscL={};
  Object.entries(byDisc).forEach(([v,n])=>{
    const l=(REF.discapacidad.find(o=>o.v===v)?.l)||v;
    byDiscL[l]=(byDiscL[l]||0)+n;
  });

  return {totalFam,totalPer:()=>totalPer,totalGest:()=>totalGest,avgPer,
    byEBS,byMuni,byTime,byZona,byVivienda,byPared,byAgua,byTipoFam,
    bySexo,byGrupoL,byAfil,byNutr,byVac,byDiscL,byIntervL};
}

function mkBar(id,labels,data,colors,horizontal=false){

}

function sortedEntries(obj,limit=12){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit);
}

function downloadJSON() {
  try {
    const isLabels = _exportMode === 'labels';
    const myId = STATE.auth?.user?.id;
    const fams = STATE.familias.filter(f => !f.deleted_at && (isAdmin() || f.created_by === myId));
    const payload = {
      exportedAt: new Date().toISOString(),
      exportedBy: STATE.profile?.email || myId,
      scope: isAdmin() ? 'all' : 'own',
      modo: isLabels ? 'etiquetas' : 'codigos',
      config: STATE.config,
      familias: fams.map(f => {
        const d2 = isLabels ? transformD(f.d2||{}, T2_LABELS, T2_DECODE) : (f.d2||{});
        return {
          id: f.id,
          ebs_code: f.ebs_code,
          created_by: f.created_by,
          created_at: f.created_at,
          updated_at: f.updated_at,
          [isLabels ? 'datos_familia' : 'd2']: d2,
          personas: (f.personas||[]).map(p => {
            const d3 = isLabels ? transformD(p.d3||{}, T3_LABELS, T3_DECODE) : (p.d3||{});
            return {
              id: p.id,
              created_at: p.created_at,
              [isLabels ? 'datos_persona' : 'd3']: d3
            };
          })
        };
      })
    };
    const content = JSON.stringify(payload, null, 2);
    const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const scope = isAdmin() ? 'TOTAL' : 'PROPIO';
    const modeTag = isLabels ? 'ETIQUETAS' : 'CODIGOS';
    const blob = new Blob([content], {type:'application/json;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `SI-APS-CCFP-${scope}-${date}-${modeTag}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('JSON exportado','ok');
  } catch(e) { toast('Error: '+e.message,'err'); }
}

function loadSheetJS() {
  if (_xlsxLoaded || window.XLSX) { _xlsxLoaded=true; return Promise.resolve(); }
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onload = () => { _xlsxLoaded=true; res(); };
    s.onerror = () => rej(new Error('No se pudo cargar SheetJS. Verifica conexión a internet.'));
    document.head.appendChild(s);
  });
}

/**
 * Decodifica un valor de campo según su descriptor de tipo.
 * Si no hay descriptor, devuelve el valor crudo (arrays → ', ').
 */
function decodeVal(val, d) {
  if (!d) return Array.isArray(val) ? val.join(', ') : (val||'');
  if (val==='' || val==null) return '';
  const lk = (refArr, v) => {
    const found = (refArr||[]).find(r => r.v === String(v));
    return found ? found.l : String(v);
  };
  if (d.type==='sino')  return val==='1' ? 'Sí' : val==='2' ? 'No' : (val||'');
  if (d.type==='ciuo')  return lk(REF_CIUO, val);
  if (d.type==='eapb')  return lk(REF_EAPB, val);
  if (d.type==='ref' || d.type==='multi') {
    const a = Array.isArray(val) ? val : [val];
    return a.map(v => lk(REF[d.ref], v)).join(', ');
  }
  return Array.isArray(val) ? val.join(', ') : (val||'');
}

/**
 * Transforma un objeto d2/d3 de claves numéricas + valores codificados
 * a claves de etiqueta + valores decodificados (para JSON legible).
 */
function transformD(data, labelsMap, decodeMap) {
  const out = {};
  for (const [k, v] of Object.entries(data||{})) {
    const key = labelsMap[k] || ('campo_'+k);
    out[key] = decodeVal(v, decodeMap[k]);
  }
  return out;
}

  // Abrir como pestaña nueva (anchor click) — más compatible que window.open con popup features
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  // Revocar la URL de blob después de 90 s para liberar memoria
  setTimeout(() => URL.revokeObjectURL(url), 90000);

// ============================================================
// TOAST
// ============================================================
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+type;
  setTimeout(()=>{el.className='toast';},3500);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await openDB();
  // ── Detectar token de recuperación en el hash de la URL ──────
  // Supabase redirige con #access_token=...&type=recovery
  const hashParams = new URLSearchParams(location.hash.replace(/^#/,''));
  if (hashParams.get('type')==='recovery' && hashParams.get('access_token')) {
    _resetToken = hashParams.get('access_token');
    _loginMode  = 'reset';
    // Clear hash so the token is not exposed in browser history on reload
    history.replaceState(null,'',location.pathname+location.search);
    render();
    return; // Don't try to restore session — user needs to set password first
  }
  // Restore session from IDB
  const sess = await idb.get('auth','session');
  if (sess?.access_token) {
    STATE.auth = {access_token:sess.access_token, refresh_token:sess.refresh_token, user:sess.user};
    STATE.profile = sess.profile||null;
    document.getElementById('btn-admin').style.display = STATE.profile?.rol==='admin' ? '' : 'none';
    document.getElementById('btn-analytics').style.display = '';
    // Load data from IDB while trying to refresh online
    await rebuildAppState();
    STATE.screen = 'home';
    // Load admin users if admin (await so data is ready before render)
    if (isAdmin()) await loadAdminUsers();
  }
  initConnectivity();
  render();
  updateSyncUI();
  // Service Worker
  if ('serviceWorker' in navigator && location.protocol!=='file:')
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

init();
</script>
